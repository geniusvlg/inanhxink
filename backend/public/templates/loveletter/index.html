<!DOCTYPE html>
<html><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href=".">
  <title>Love Letter</title>
  <link rel="icon" type="image/x-icon" href="https://uynuyn.tokitoki.love/asset/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head><body>

  <div class="background-title" id="backgroundTitle">Love Letter</div>

  <!-- Music toggle button -->
  <button class="music-btn" id="musicBtn" title="Tắt/mở nhạc" aria-label="Toggle music">
    <svg class="music-icon icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    <svg class="music-icon icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      <line x1="2" y1="2" x2="22" y2="22"/>
    </svg>
  </button>

  <!-- Floating hearts -->
  <div class="letter-float-layer" aria-hidden="true">
    <div class="heart-float heart-float-1">
      <svg viewBox="0 0 32 32" width="44" height="44"><path d="M16 29 C14 27, 2 18, 2 10 A7 7 0 0 1 16 7 A7 7 0 0 1 30 10 C30 18, 18 27, 16 29Z" fill="#FFB8C6"/></svg>
    </div>
    <div class="heart-float heart-float-2">
      <svg viewBox="0 0 32 32" width="80" height="80" overflow="visible"><path d="M16 29 C14 27, 2 18, 2 10 A7 7 0 0 1 16 7 A7 7 0 0 1 30 10 C30 18, 18 27, 16 29Z" fill="#FFE0E8" stroke="#C0392B" stroke-width="1.5"/></svg>
    </div>
    <div class="heart-float heart-float-3">
      <svg viewBox="0 0 32 32" width="62" height="62"><path d="M16 29 C14 27, 2 18, 2 10 A7 7 0 0 1 16 7 A7 7 0 0 1 30 10 C30 18, 18 27, 16 29Z" fill="#FFCDD8"/></svg>
    </div>
    <div class="heart-float heart-float-4">
      <svg viewBox="0 0 32 32" width="76" height="76"><path d="M16 29 C14 27, 2 18, 2 10 A7 7 0 0 1 16 7 A7 7 0 0 1 30 10 C30 18, 18 27, 16 29Z" fill="#E07090"/></svg>
    </div>
    <div class="heart-float heart-float-5">
      <svg viewBox="0 0 32 32" width="38" height="38"><path d="M16 29 C14 27, 2 18, 2 10 A7 7 0 0 1 16 7 A7 7 0 0 1 30 10 C30 18, 18 27, 16 29Z" fill="#C0392B"/></svg>
    </div>
    <div class="heart-float heart-float-6">
      <svg viewBox="0 0 32 32" width="56" height="56" overflow="visible"><path d="M16 29 C14 27, 2 18, 2 10 A7 7 0 0 1 16 7 A7 7 0 0 1 30 10 C30 18, 18 27, 16 29Z" fill="#FFE8EE" stroke="#F58E95" stroke-width="1.5"/></svg>
    </div>
  </div>

  <!-- Envelope stage (OurMemories letter design) -->
  <div class="letter-stage" id="letterStage">
    <div class="envelope-wrap fly-in" id="envelope">

      <!-- Paper lives INSIDE the envelope -->
      <label class="envelope-label" id="letterLabel">
        <div class="extracted-paper" id="extractedPaper" style="left: 50%">
          <div class="paper-perspective" id="paperCard">

            <div class="tile out" id="tileOut">
              <p class="tile-hint" id="letterHint"></p>
            </div>

            <div class="tile in-top" id="tileInTop">
              <div class="tile-inner-top">
                <h2 class="tile-title">Love letter</h2>
                <p class="tile-greeting" id="letterModalGreeting"></p>
                <div class="tile-body" id="letterBodyTop"></div>
              </div>
            </div>

            <div class="tile in-bottom" id="tileInBottom">
              <div class="tile-inner-bottom">
                <div class="tile-body" id="letterBodyBottom"></div>
                <p class="tile-signoff" id="letterNote"></p>
                <p class="tile-signature" id="letterModalSignature"></p>
              </div>
            </div>

          </div>
        </div>
      </label>

      <!-- Envelope front face -->
      <div class="clip-path-front">
        <div class="clip-path-front-left"></div>
        <div class="clip-path-front-right"></div>
        <div class="clip-path-front-bottom"></div>
      </div>

      <!-- Envelope flap -->
      <div class="clip-path-flap-bg" id="envelopeFlap"></div>

      <!-- Seal heart -->
      <div class="seal-heart-btn" id="openLetterBtn">
        <svg viewBox="0 0 32 29.6" class="seal-svg" style="display:block">
          <path d="M23.6,0c-2.7,0-5.1,1.3-6.6,3.3C15.5,1.3,13.1,0,10.4,0C4.7,0,0,4.7,0,10.4c0,11.1,16,19.2,16,19.2s16-8.1,16-19.2C32,4.7,27.3,0,23.6,0z" fill="#E66F71"/>
        </svg>
      </div>

      <!-- Sender / Receiver address on envelope body -->
      <div class="env-address">
        <p class="env-sender" id="envSender"></p>
        <p class="env-receiver" id="envReceiver"></p>
      </div>

    </div>
  </div>

  <!-- Polaroid photos -->
  <div class="polaroid-group" id="polaroidGroup">
    <div class="polaroid polaroid-1"><img src="./images/5fhz0ver.gry.jpeg" alt="Polaroid 1"></div>
    <div class="polaroid polaroid-2"><img src="./images/lzbnesb1.2ca.jpeg" alt="Polaroid 2"></div>
    <div class="polaroid polaroid-3"><img src="./images/jyg2rqun.1fx.jpeg" alt="Polaroid 3"></div>
    <div class="polaroid polaroid-4"><img src="./images/mzbnhhoq.tgu.jpeg" alt="Polaroid 4"></div>
    <div class="polaroid polaroid-5"><img src="./images/mn41lj4p.eq0.jpeg" alt="Polaroid 5"></div>
    <div class="polaroid polaroid-6"><img src="./images/dderhkan.v4d.jpeg" alt="Polaroid 6"></div>
    <div class="polaroid polaroid-7"><img src="./images/and5bcb2.i0s.jpeg" alt="Polaroid 7"></div>
    <div class="polaroid polaroid-8"><img src="./images/qvz5gq44.um2.jpeg" alt="Polaroid 8"></div>
  </div>

  <div id="polaroidOverlay"></div>

  <div id="polaroidFullscreenOverlay">
    <div class="fullscreen-content">
      <img id="fullscreenPolaroidImg">
      <div id="fullscreenPolaroidLabel"></div>
      <button id="closeFullscreenBtn">×</button>
      <div class="fullscreen-arrow" title="Bấm để xem ảnh tiếp theo"></div>
    </div>
  </div>

<script>
  var _sub = window.__SUBDOMAIN__ || '';
  fetch('/api/site-data' + (_sub ? '?sub=' + _sub : ''))
    .then(function(r) { return r.json(); })
    .then(function(data) { window.siteData = (data && data.template_data) ? data.template_data : {}; })
    .catch(function() { window.siteData = null; })
    .finally(function() {
      var s = document.createElement('script');
      s.src = './app.js';
      document.body.appendChild(s);
    });
</script>
</body></html>
