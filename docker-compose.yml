services:
  frontend:
    image: ghcr.io/geniusvlg/inanhxink/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend-app
      args:
        VITE_API_URL: ${VITE_API_URL:-https://inanhxink.com}
    volumes:
      - frontend_dist:/dist

  admin:
    image: ghcr.io/geniusvlg/inanhxink/admin:${IMAGE_TAG:-latest}
    build:
      context: ./admin-app
    volumes:
      - admin_dist:/dist

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: inanhxink
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: inanhxink
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inanhxink"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10-alpine
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/inanhxink
      FLYWAY_USER: inanhxink
      FLYWAY_PASSWORD: ${DB_PASSWORD}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_BASELINE_VERSION: "0"
    volumes:
      - ./backend/database:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  backend:
    image: ghcr.io/geniusvlg/inanhxink/backend:${IMAGE_TAG:-latest}
    build: ./backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DOMAIN: ${DOMAIN}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: inanhxink
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: inanhxink
      SEPAY_API_KEY: ${SEPAY_API_KEY}
      SEPAY_ACCOUNT_NO: ${SEPAY_ACCOUNT_NO}
      SEPAY_BANK: ${SEPAY_BANK:-MBBank}
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-north1}
      S3_BUCKET: ${S3_BUCKET:-inanhxink-prod}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    volumes:
      - ./uploads:/app/dist/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/var/www/order:ro
      - admin_dist:/var/www/admin:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - admin
      - backend
    restart: always

volumes:
  frontend_dist:
  admin_dist:
