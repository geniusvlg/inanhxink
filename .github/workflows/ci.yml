name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend-app

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend-app

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-app
          push: false
          build-args: |
            VITE_API_URL=https://inanhxink.com
            VITE_CDN_URL=https://cdn.inanhxink.com/inanhxink-prod
            VITE_S3_BUCKET=inanhxink-prod
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build admin image
        uses: docker/build-push-action@v6
        with:
          context: ./admin-app
          push: false
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
